# GitHub Actions CI script for mkpsxiso
# (C) 2021 spicyjpeg

name: Build mkpsxiso
on:   [ push, pull_request ]

jobs:
  build-windows:
    name:    Build mkpsxiso on Windows
    # TODO: Implement dynamic installation of the v143 toolset on windows-latest
    # once GitHub completely drops support for the windows-2022 runner.
    runs-on: windows-2022

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Build and package mkpsxiso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mkpsxiso-windows
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  build-linux:
    name:    Build mkpsxiso on Linux
    runs-on: ubuntu-22.04

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Build and package mkpsxiso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mkpsxiso-linux
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  build-macos:
    name:    Build mkpsxiso on macOS
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CMAKE_OSX_ARCHITECTURES:  "x86_64;arm64"

    steps:
    - name: Fetch repo contents
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Build and package mkpsxiso
      run: |
        cmake --workflow ci

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mkpsxiso-macos
        path: |
          build/packages/*
          !build/packages/_CPack_Packages

  # This job takes care of creating a new release and upload the build
  # artifacts if the last commit is associated to a tag.
  create-release:
    name:    Create release
    runs-on: ubuntu-latest
    needs:   [ build-windows, build-linux, build-macos ]

    steps:
    - name: Fetch build artifacts
      if:   ${{ github.ref_type == 'tag' }}
      uses: actions/download-artifact@v7

    - name: Publish release
      if:   ${{ github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v2
      with:
        fail_on_unmatched_files: true
        #generate_release_notes:  true
        files: |
          mkpsxiso-windows/*
          mkpsxiso-linux/*
          mkpsxiso-macos/*
